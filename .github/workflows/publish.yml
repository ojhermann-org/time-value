name: publish

# Publish the core `time_value` crate to crates.io via OIDC trusted publishing —
# no long-lived API token (docs/adr/0012-ci-and-release-automation.md). Triggered
# by the per-crate tag that release-plz.yml creates on a release.
#
# Owner-side setup required before this can succeed (one-time):
#   - On crates.io, register a Trusted Publisher for the `time_value` crate:
#     owner `ojhermann-org`, repo `time-value`, workflow `publish.yml`.
# Until then this workflow is dormant (it only runs on a `time_value-v*` tag,
# which does not exist until the first release).
#
# The cli/mcp crates are `publish = false` for now (ADR-0012); when they ship,
# add their tag patterns here and register trusted publishers for them.

on:
  push:
    tags:
      - "time_value-v*"

permissions:
  # Required for the OIDC token exchange with crates.io.
  id-token: write
  contents: read

jobs:
  publish:
    name: cargo publish (OIDC)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v21

      - name: Nix store cache
        uses: DeterminateSystems/magic-nix-cache-action@v13

      # Exchange the GitHub OIDC token for a short-lived crates.io token.
      - name: Authenticate to crates.io
        uses: rust-lang/crates-io-auth-action@v1
        id: auth

      # Build and publish through the flake, so the publish uses the pinned
      # toolchain (rust-toolchain.toml) like every other check.
      - name: Publish time_value
        run: nix develop -c cargo publish -p time_value
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
