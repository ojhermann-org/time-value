name: release-plz

# Versions, changelogs, tags, and GitHub releases from Conventional Commits
# (docs/adr/0012-ci-and-release-automation.md). Does NOT publish to crates.io —
# `publish = false` in release-plz.toml; publishing is publish.yml's job, on the
# tag this workflow creates.
#
# Repository settings required for the release-PR flow (owner-side, one-time):
#   - Settings → Actions → General → Workflow permissions: Read and write
#   - "Allow GitHub Actions to create and approve pull requests": enabled
# A `RELEASE_PLZ_TOKEN` PAT is optional — set it so the release PR itself
# triggers CI (PRs opened by the default GITHUB_TOKEN do not).

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  # Tag + create GitHub releases for versions that have merged into main.
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}

  # Open/update the "Release" PR that bumps versions and writes changelogs.
  release-pr:
    name: Release PR
    runs-on: ubuntu-latest
    concurrency:
      group: release-plz-pr-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}
