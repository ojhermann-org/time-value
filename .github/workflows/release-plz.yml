name: release-plz

# Versions, changelogs, tags, and GitHub releases from Conventional Commits
# (docs/adr/0012-ci-and-release-automation.md). Does NOT publish to crates.io —
# `publish = false` in release-plz.toml; publishing is publish.yml's job, on the
# tag this workflow creates.
#
# Repository settings required for the release-PR flow (owner-side, one-time):
#   - Settings → Actions → General → Workflow permissions: Read and write
#   - "Allow GitHub Actions to create and approve pull requests": enabled
# A `RELEASE_PLZ_TOKEN` PAT is REQUIRED for the actual publish: set it so the
# release PR triggers CI *and* so the release tag triggers publish.yml — a tag
# pushed by the default GITHUB_TOKEN does not trigger other workflows (GitHub's
# recursion guard), so publish.yml never fires without it.
#
# ⏸️ HELD (2026-07-09): both jobs below are gated `if: ${{ false }}` while the core
# is built out to a complete 1.0.0 before the first release (ADR-0022). Left live,
# the `release` job tags `time_value-v<Cargo.toml version>` on EVERY push to main,
# independent of the held release PR — it prematurely tagged + GitHub-released
# 1.0.0 at commit b697e65 (since deleted; nothing reached crates.io because
# publish.yml never fired, per the note above). To cut the real 1.0.0: remove the
# two `if: ${{ false }}` guards below and set RELEASE_PLZ_TOKEN.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  # Tag + create GitHub releases for versions that have merged into main.
  release:
    name: Release
    if: ${{ false }} # ⏸️ HELD until the real 1.0.0 — see the hold note above
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}

  # Open/update the "Release" PR that bumps versions and writes changelogs.
  release-pr:
    name: Release PR
    if: ${{ false }} # ⏸️ HELD until the real 1.0.0 — see the hold note above
    runs-on: ubuntu-latest
    concurrency:
      group: release-plz-pr-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}
