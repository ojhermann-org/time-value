name: CI

# Every check runs through the Nix flake (`nix develop -c cargo …`) so CI uses
# the exact toolchain, cargo-nextest, and cargo-deny the flake pins — one source
# of truth with local dev (docs/adr/0012-ci-and-release-automation.md).

on:
  push:
    branches: [main]
  pull_request:
  # Run in the merge queue too: the `ci` check must be produced against the
  # `merge_group` ref, or a required-check merge queue would deadlock (see
  # docs/adr/0012-ci-and-release-automation.md).
  merge_group:

# A newer push to the same ref supersedes an in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # NOTE: the job id `ci` is the required status check enforced by the org
  # ruleset — do not rename it or set a custom `name:` (which would change the
  # surfaced check name) and do not remove it (see CLAUDE.md).
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v21

      - name: Nix store cache
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Cargo registry & build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Format
        run: nix develop -c cargo fmt --all -- --check

      # Default features build the `no_std`, zero-dependency core — this is the
      # step that catches an accidental `std` dependency in the core.
      - name: Clippy (default features)
        run: nix develop -c cargo clippy --workspace --all-targets -- -D warnings

      - name: Clippy (all features)
        run: nix develop -c cargo clippy --workspace --all-targets --all-features -- -D warnings

      # The no_std + libm path (transcendental math via libm::pow) is not built
      # by --all-features, which prefers std; check it explicitly so it can't rot.
      - name: Clippy (no_std + libm)
        run: nix develop -c cargo clippy -p time_value --no-default-features --features libm --all-targets -- -D warnings

      # The serde derives must stay no_std-clean: --all-features pulls in std, so
      # check the pure no_std + serde build explicitly (ADR-0042).
      - name: Clippy (no_std + serde)
        run: nix develop -c cargo clippy -p time_value --no-default-features --features serde --all-targets -- -D warnings

      # `--all-features` so feature-gated operations (and their tests) are
      # exercised, not just compiled.
      - name: Test
        run: nix develop -c cargo nextest run --workspace --all-features

      # `--all-features` above enables `std`, so its `powf` runs — but the
      # `no_std` + `libm` path (`libm::pow`) then never executes, only compiles.
      # Run the core's tests under it too, so a std/libm numeric divergence can't
      # slip through (ADR-0021).
      - name: Test (no_std + libm)
        run: nix develop -c cargo nextest run -p time_value --no-default-features --features libm

      # nextest does not run doctests; run them explicitly (they include the
      # `compile_fail` doctests that prove the periodicity mismatch is rejected).
      - name: Doctests
        run: nix develop -c cargo test --doc --workspace --all-features

      # The core library keeps a conservative MSRV (1.85) below the workspace
      # toolchain (1.88, forced by the MCP crate's deps). Verify it on a real 1.85
      # toolchain so the promise can't silently regress (ADR-0017). This is a
      # `build`, not a `test`: dev-dependencies (proptest) and `#[cfg(test)]` code
      # are not part of the published crate, and building skips them, so a test
      # framework with a newer MSRV cannot force the core's MSRV up.
      - name: Core MSRV (1.85)
        run: nix develop .#msrv -c cargo build -p time_value --all-features

      - name: Licences & advisories
        run: nix develop -c cargo deny check
