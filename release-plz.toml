# release-plz configuration (docs/adr/0012-ci-and-release-automation.md).
#
# release-plz owns versions, changelogs, git tags, and GitHub releases (from
# Conventional Commits). It does NOT publish to crates.io: publishing is done by
# .github/workflows/publish.yml via crates.io OIDC trusted publishing, triggered
# by the tag release-plz creates. Per-crate independent versions (ADR-0002) are
# release-plz's default.

[workspace]
# Do not run `cargo publish` — publish.yml does it over OIDC (no token).
publish = false
# Tag and cut a GitHub release per released crate version (tag `time_value-vX.Y.Z`).
git_release_enable = true

# `time-value-cli` and `time-value-mcp` carry `publish = false` in their own
# Cargo.toml (ADR-0012), so release-plz skips them until their surfaces stabilise;
# only the core `time_value` crate is versioned and tagged here.
