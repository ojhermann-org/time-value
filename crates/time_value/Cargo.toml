[package]
name = "time_value"
version = "1.0.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
description = "Type-safe time-value-of-money calculations in Rust"
homepage = "https://crates.io/crates/time_value"
documentation = "https://docs.rs/time_value"
readme = "README.md"
keywords = ["finance", "tvm", "npv", "irr", "annuity"]
categories = ["finance", "mathematics", "no-std"]

[lints]
workspace = true

[features]
# The default core is `no_std` and dependency-free (ADR-0009).
default = []
# Pull in `std` (transcendental math, `std::error::Error` blanket impls where
# cheaper than the `core` equivalents).
std = []
# `no_std` transcendental functions (`powf`/`ln`/`exp`) via `libm`, needed for
# IRR and continuous compounding without `std` (ADR-0009).
libm = ["dep:libm"]
# Derive `serde` on the domain newtypes so the CLI/MCP surfaces can (de)serialise
# them (ADR-0005). Off by default; the core does not require `serde`.
serde = ["dep:serde"]

[dependencies]
libm = { workspace = true, optional = true }
# `default-features`/`derive` come from the workspace entry (both `no_std`-safe).
serde = { workspace = true, optional = true }
